<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovann - Links</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background-color: #0f172a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* Animated background particles */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(circle at 20% 20%, rgba(0, 217, 255, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(0, 217, 255, 0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 420px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  /* Profile Section */
  .profile {
    text-align: center;
    margin-bottom: 32px;
  }

  .avatar-wrapper {
    position: relative;
    display: inline-block;
    margin-bottom: 16px;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #00d9ff;
    box-shadow: 0 0 20px rgba(0, 217, 255, 0.3), 0 0 40px rgba(0, 217, 255, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .avatar:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0, 217, 255, 0.5), 0 0 60px rgba(0, 217, 255, 0.2);
  }

  .avatar-ring {
    position: absolute;
    top: -4px;
    left: -4px;
    width: 104px;
    height: 104px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #00d9ff;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .profile-name {
    color: #ffffff;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  .profile-title {
    color: #00d9ff;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .profile-bio {
    color: #94a3b8;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.5;
  }

  /* Links Section */
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-item {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(0, 217, 255, 0.15);
    border-radius: 14px;
    padding: 16px 20px;
    text-decoration: none;
    color: #ffffff;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .link-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.08), transparent);
    transition: left 0.5s ease;
  }

  .link-item:hover::before {
    left: 100%;
  }

  .link-item:hover {
    background: rgba(0, 217, 255, 0.1);
    border-color: rgba(0, 217, 255, 0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 217, 255, 0.15);
  }

  .link-item:active {
    transform: translateY(0);
  }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(0, 217, 255, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 14px;
    flex-shrink: 0;
    transition: background 0.3s ease;
  }

  .link-item:hover .link-icon {
    background: rgba(0, 217, 255, 0.25);
  }

  .link-icon svg {
    width: 20px;
    height: 20px;
    fill: #00d9ff;
  }

  .link-text {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .link-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .link-desc {
    font-size: 12px;
    color: #64748b;
    font-weight: 300;
  }

  .link-arrow {
    color: #00d9ff;
    font-size: 18px;
    opacity: 0;
    transform: translateX(-8px);
    transition: all 0.3s ease;
    position: relative;
    z-index: 1;
  }

  .link-item:hover .link-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid rgba(0, 217, 255, 0.1);
  }

  .footer-text {
    color: #475569;
    font-size: 12px;
    font-weight: 300;
  }

  .footer-text a {
    color: #00d9ff;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .footer-text a:hover {
    color: #38bdf8;
  }

  .social-links {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .social-link {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0, 217, 255, 0.08);
    border: 1px solid rgba(0, 217, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    text-decoration: none;
  }

  .social-link:hover {
    background: rgba(0, 217, 255, 0.2);
    border-color: rgba(0, 217, 255, 0.4);
    transform: translateY(-2px);
  }

  .social-link svg {
    width: 16px;
    height: 16px;
    fill: #00d9ff;
  }

  /* Responsive */
  @media (max-width: 480px) {
    body {
      padding: 30px 16px;
    }
    .profile-name {
      font-size: 20px;
    }
    .link-item {
      padding: 14px 16px;
    }
  }

  /* Fade-in animation */
  .fade-in {
    opacity: 0;
    transform: translateY(15px);
    animation: fadeInUp 0.5s ease forwards;
  }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .links .link-item:nth-child(1) { animation-delay: 0.1s; }
  .links .link-item:nth-child(2) { animation-delay: 0.2s; }
  .links .link-item:nth-child(3) { animation-delay: 0.3s; }
  .links .link-item:nth-child(4) { animation-delay: 0.4s; }
  .links .link-item:nth-child(5) { animation-delay: 0.5s; }
  .links .link-item:nth-child(6) { animation-delay: 0.6s; }
  .links .link-item:nth-child(7) { animation-delay: 0.7s; }
  .links .link-item:nth-child(8) { animation-delay: 0.8s; }
</style>
</head>
